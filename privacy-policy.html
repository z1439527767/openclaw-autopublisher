    <h1>隐私政策</h1>
    <div class="section">
        <h2>1. 信息收集</h2>
        <p>OpenClaw Auto Publisher仅用于帮助用户自动化管理TikTok账号。我们不收集或存储用户的个人信息或敏感数据。</p>
    </div>
    <div class="section">
        <h2>2. 数据使用</h2>
        <p>所有数据仅在用户设备本地处理，不会传输到我们的服务器。应用仅通过TikTok官方API访问用户账号。</p>
    </div>
    <div class="section">
        <h2>3. 第三方服务</h2>
        <p>我们仅使用TikTok官方API，遵循TikTok的服务条款和隐私政策。</p>
    </div>
